<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Agenda Telefonica SD</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        label { display: inline-block; width: 100px; }
        input { margin-bottom: 5px; }
        button { cursor: pointer; }
    </style>
</head>
<body>

<h1>Gestiune Agenda Telefonica</h1>

<div class="section">
    Adauga o persoana in agenda (POST)
    <form id="createForm">
        <label>ID:</label> <input type="number" id="c_id" required><br>
        <label>Nume:</label> <input type="text" id="c_lastName" required><br>
        <label>Prenume:</label> <input type="text" id="c_firstName" required><br>
        <label>Telefon:</label> <input type="text" id="c_phone" required><br>
        <button type="submit">Update agenda</button>
    </form>
</div>

<div class="section">
    Cauta o persoana (GET)
    <form action="/agenda" method="GET">
        <label>Nume:</label> <input type="text" name="lastName">
        <button type="submit">Cauta </button>
    </form>
    <br>
    <button onclick="getAllPersons()">Afiseaza tot</button>
    <div id="results"></div>
</div>

<div class="section">
    Modifica / Sterge (PUT/DELETE)
    <p><small>Introdu ID-ul persoanei vizate:</small></p>
    <label>ID Persoană:</label> <input type="number" id="target_id"><br>
    <hr>
    <label>Nume nou:</label> <input type="text" id="u_lastName"><br>
    <label>Prenume nou:</label> <input type="text" id="u_firstName"><br>
    <label>Telefon nou:</label> <input type="text" id="u_phone"><br>
    <button onclick="updatePerson()">Actualizeaza (PUT)</button>
    <button onclick="deletePerson()" style="color: red;">Sterge (DELETE)</button>
</div>

<script>
    document.getElementById('createForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const person = {
            id: parseInt(document.getElementById('c_id').value),
            lastName: document.getElementById('c_lastName').value,
            firstName: document.getElementById('c_firstName').value,
            telephoneNumber: document.getElementById('c_phone').value
        };

        const response = await fetch('/person', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(person)
        });

        if(response.ok) alert('Persoană creată cu succes!');
        else alert('Eroare la creare.');
    });

    async function getAllPersons() {
        const response = await fetch('/agenda');
        const data = await response.json();
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '<ul>' + data.map(p =>
            `<li>[ID: ${p.id}] ${p.lastName} ${p.firstName} - ${p.telephoneNumber}</li>`
        ).join('') + '</ul>';
    }

    async function updatePerson() {
        const id = document.getElementById('target_id').value;
        const person = {
            id: parseInt(id),
            lastName: document.getElementById('u_lastName').value,
            firstName: document.getElementById('u_firstName').value,
            telephoneNumber: document.getElementById('u_phone').value
        };

        const response = await fetch(`/person/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(person)
        });

        if(response.ok) alert('Persoana modificata!');
        else alert('Persoana nu a fost gasita (404).');
    }

    async function deletePerson() {
        const id = document.getElementById('target_id').value;
        if(!id) return alert("Introdu un ID!");

        const response = await fetch(`/person/${id}`, {
            method: 'DELETE'
        });

        if(response.ok) alert('Persoana stearsa!');
        else alert('Eroare: Persoana nu exista.');
    }
</script>
</body>
</html>
